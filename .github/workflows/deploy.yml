name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Quyền cần để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy 1 lần deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Tự bật GitHub Pages (source = GitHub Actions) ở lần chạy đầu
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          # Site chạy dưới sub-path của repo, vd. /smartbiz
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Disable Jekyll (giữ thư mục _next)
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
